<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOAK - Enlaces</title>
    <!-- Incluimos Font Awesome para los íconos idénticos a la imagen -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fcf9f2; /* Fondo crema claro exterior */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contenedor principal estilo tarjeta móvil */
        .card-container {
            background-color: #fdfbf7; /* Color de fondo interno */
            width: 100%;
            max-width: 430px;
            border-radius: 30px;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 40px;
        }

        /* Encabezado bitono de la parte superior */
        .header-bg {
            background-color: #edebe6;
            width: 100%;
            height: 110px;
            position: relative;
            margin-bottom: 60px;
        }

        /* Contenedor circular sin borde negro para evitar doble línea */
        .logo-container {
            width: 110px;
            height: 110px;
            background-color: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            bottom: -55px;
            left: 50%;
            transform: translateX(-50%);
            overflow: hidden; /* Corta la imagen en forma circular perfecta */
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Hace que el logo ocupe todo el círculo sin deformarse */
        }

        /* Textos de la Bio */
        .bio-container {
            text-align: center;
            padding: 0 30px;
            margin-bottom: 20px;
        }

        .bio-text {
            font-size: 1rem;
            font-weight: bold;
            color: #123511; /* Verde oscuro sutil para el texto */
            line-height: 1.4;
        }

        /* Línea divisoria gris */
        .divider {
            width: 85%;
            height: 1px;
            background-color: #d1cfcb;
            margin-bottom: 25px;
        }

        /* Contenedor de los botones */
        .links-container {
            width: 85%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Estilo base para todos los botones */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            padding: 18px 20px;
            border-radius: 12px;
            position: relative;
            transition: transform 0.2s ease, opacity 0.2s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }

        /* Posicionamiento estricto del ícono a la izquierda */
        .btn i {
            position: absolute;
            left: 20px;
            font-size: 1.3rem;
        }

        /* Colores específicos de los botones */
        .btn-tienda {
            background-color: #123511;
        }

        .btn-instagram {
            background-color: #e6007e;
        }

        .btn-tiktok {
            background-color: #000000;
        }

        .btn-facebook {
            background-color: #115cc1;
        }

        .btn-whatsapp {
            background-color: #79cb22;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <!-- Parte superior bitono y logo corregido -->
        <div class="header-bg">
            <div class="logo-container">
                <!-- Llama directamente a tu archivo logo.png.png recién subido -->
                <img class="logo-img" src="logo.png.png" alt="Logo NOAK">
            </div>
        </div>

        <!-- Información de Bio -->
        <div class="bio-container">
            <p class="bio-text">Tecnología, hogar y lifestyle.<br>Productos pensados para tu día a día</p>
        </div>

        <!-- Línea separadora -->
        <div class="divider"></div>

        <!-- Listado de Botones -->
        <div class="links-container">
            <!-- 1. Tienda Online -->
            <a href="https://www.noak.com.ar" target="_blank" class="btn btn-tienda">
                <i class="fa-solid fa-globe"></i> Tienda Online
            </a>
            
            <!-- 2. Instagram (Con enlace profundo universal corregido) -->
            <a href="https://www.instagram.com/_u/noak.arg/" target="_blank" class="btn btn-instagram">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            
            <!-- 3. Tiktok -->
            <a href="#" target="_blank" class="btn btn-tiktok">
                <i class="fa-brands fa-tiktok"></i> Tiktok
            </a>
            
            <!-- 4. Facebook -->
            <a href="#" target="_blank" class="btn btn-facebook">
                <i class="fa-brands fa-facebook-f"></i> Facebook
            </a>
            
            <!-- 5. Whatsapp Soporte -->
<a href="https://wa.me/5491168904756"
   target="_blank"
   class="btn btn-whatsapp">
    <i class="fa-brands fa-whatsapp"></i> Whatsapp Soporte
</a>
        </div>
    </div>

</body>
</html>
