<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOAK - Enlaces Oficiales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 1. RESET Y VARIABLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f7f6f2; /* Fondo beige suave como el tuyo */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 2. CONTENEDOR PRINCIPAL (TARJETA) */
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 430px; /* Tamaño ideal para simular un celular */
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            text-align: center;
            padding-bottom: 30px;
        }

        /* Header con el fondo gris superior */
        .header-bg {
            background-color: #ededed;
            height: 100px;
            position: relative;
            margin-bottom: 60px;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 50%;
            border: 3px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 1px;
        }

        /* 3. TEXTOS */
        .info-section {
            padding: 0 30px;
            margin-bottom: 30px;
        }

        .info-section h1 {
            font-size: 1.1rem;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .info-section p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
        }

        /* 4. BOTONES DE ENLACE */
        .links-wrapper {
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            padding: 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Botón Destacado: Tienda Online */
        .btn-shop {
            background-color: #0d2b11; /* Verde oscuro elegante */
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(13, 43, 17, 0.2);
        }

        /* Animación sutil de pulso para la tienda */
        .btn-shop::after {
            content: '¡VISITAR!';
            position: absolute;
            right: 15px;
            font-size: 0.7rem;
            background: #e67e22;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            animation: pulse 2s infinite;
        }

        /* Botón Soporte WhatsApp */
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
        }

        /* Efectos Hover (cuando pasas el mouse) */
        .btn-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            filter: brightness(1.1);
        }

        /* 5. FOOTER CON REDES SOCIALES HORIZONTALES */
        .social-footer {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-icon {
            color: #333;
            font-size: 1.4rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        /* Colores de marca en el hover de los iconos pequeños */
        .social-icon.insta:hover { color: #e1306c; transform: scale(1.2); }
        .social-icon.tiktok:hover { color: #000000; transform: scale(1.2); }
        .social-icon.fb:hover { color: #1877f2; transform: scale(1.2); }

        /* ANIMACIONES */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-bg">
            <div class="logo-container">
                NOAK
            </div>
        </div>

        <div class="info-section">
            <h1>Tecnología, hogar y lifestyle.</h1>
            <p>Productos pensados para tu día a día</p>
        </div>

        <div class="links-wrapper">
            <a href="TU_LINK_DE_TIENDA" class="btn-link btn-shop">
                TIENDA ONLINE
            </a>
            
            <a href="TU_LINK_DE_WHATSAPP" class="btn-link btn-whatsapp">
                <i class="fab fa-whatsapp" style="margin-right: 8px;"></i> WHATSAPP SOPORTE
            </a>
        </div>

        <div class="social-footer">
            <a href="TU_LINK_INSTAGRAM" class="social-icon insta" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="TU_LINK_TIKTOK" class="social-icon tiktok" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="TU_LINK_FACEBOOK" class="social-icon fb" target="_blank"><i class="fab fa-facebook-f"></i></a>
        </div>
    </div>

</body>
</html>
